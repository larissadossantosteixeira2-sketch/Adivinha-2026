<!DOCTYPE html>
<html lang="pt-br" >
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Jogo de Adivinhação </title>

        <style>
            .corpoDaPagina{
                font-family: Arial, sans-serif;
                background-color: #f4f4f4;
                display: flex;
                justify-content: center;
                align-items: center;
                height: 100vh;
                margin: 0;
            }

            h1{
                color: #333;
            }

            .container{
                text-align: center;
                background-color: #fff;
                padding: 20px;
                border-radius: 10px;
                box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
            }

            input[type="number"] {
                padding: 10px;
                font-size: 16px;
                width: 50px;
                margin-bottom: 10px;
            }

            button{
                padding: 10px 20px;
                font-size:  16px;
                cursor: pointer;
                background-color: #28a745;
                color: #fff;
                border: none;
                border-radius: 5px;
            }

            .mensagem{
                margin-top: 20px;
                font-size: 18px;
            }
        </style>
    </head>
    
    <body class="corpoDaPagina">
        <div class="container">
            <h1>&#129299; Jogo de Adivinhação &#128564;</h1>
            <p>Tente adivinhar o número secreto entre 1 e 100</p>
            <input type="number" id="TXTPalpite" min="1" max="100"/>
            <button id="BTNAdivinhar" onclick="verificarPalpite()">Adivinhar</button>
            <div class="mensagem" id="DIVMensagem"></div>
        </div>
    </body>


    <script>
         let numeroSecreto = math.floor(Math.random() * 100);

         function verificarPalpite(){
            //----------------------------
            // 1º Verificar se o jogador digitou 
            //    algum numero na caixa de texto
            //-----------------------------
            let caixaDeTexto = document.getElementById('TXTPalpite');
            let dvMensagem = document.getElementById('DIVMensagem');

            let chuteDoJogador = parseInt(caixaDeTexto.value);

 
            //valida se o chute do jogador é um numero e se está entre 1 e 100
            if( isNaN(chuteDoJogador) || chuteDoJogador < 1 || chuteDoJogador > 100 ){
                dvMensagem.textContent = 'Numero inválido!!';
                return;
            }     
              
            //Validação do número digitado. O campo não pode ser vazio e o número deve estar entre 1 a 100
            if( isNaN(chuteDoJogador) || chuteDoJogador < 1 || chuteDoJogador > 100){
                dvMensagem.textContent = 'Porfavor, insira um número válido entre 1 e 100';
            }else{
                 dvMensagem.textContent = 'Numero Válido: '+chuteDoJogador;
            }

        
            if(chuteDoJogador === numeroSecreto){
              dvMensagem.textContent = 'Parabéns! Você acertou o número secreto '+numeroSecreto;
            }else{
              dvMensagem.textContent = 'Voce errou!';
            } 
          }
         


    </script>

</html>
